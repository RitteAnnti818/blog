<!-- Light/Dark mode toggle for Minimal Mistakes -->
<script>
  // Set the theme as early as possible to avoid a flash of the wrong colors.
  (function () {
    try {
      var saved = localStorage.getItem("theme");
      var prefersDark =
        window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: dark)").matches;
      var theme = saved || (prefersDark ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    } catch (e) {}
  })();

  // Inject a toggle button into the top nav once the page is ready.
  document.addEventListener("DOMContentLoaded", function () {
    var nav = document.querySelector(".greedy-nav");
    if (!nav) return;

    var btn = document.createElement("button");
    btn.className = "theme-toggle";
    btn.type = "button";
    btn.setAttribute("aria-label", "Toggle light/dark mode");

    function render() {
      var t = document.documentElement.getAttribute("data-theme");
      btn.innerHTML = t === "dark" ? "☀️" : "🌙";
    }
    render();

    btn.addEventListener("click", function () {
      var cur = document.documentElement.getAttribute("data-theme");
      var next = cur === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      try {
        localStorage.setItem("theme", next);
      } catch (e) {}
      render();
    });

    nav.appendChild(btn);
  });
</script>
