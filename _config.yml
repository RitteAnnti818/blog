# Blog site config — served at https://RitteAnnti818.github.io/blog/
# Theme: Minimal Mistakes (same theme as kimjy99.github.io)

remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "default" # "default", "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

# Site
title: "Heeyeon Kim's Blog"
name: "Heeyeon Kim"
description: "Notes on research, reading, and projects."
url: "https://RitteAnnti818.github.io"
baseurl: "/blog"
repository: "RitteAnnti818/blog"
words_per_minute: 200

# Build settings
markdown: kramdown
locale: "en-US"

# Outputting
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: Asia/Seoul

# Left sidebar author profile
author:
  name: "Heeyeon Kim"
  bio: "Notes on research, reading, and projects."
  location: "Republic of Korea"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/RitteAnnti818"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:heeyeon23@jbnu.ac.kr"
    - label: "Homepage"
      icon: "fas fa-fw fa-home"
      url: "https://RitteAnnti818.github.io"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/RitteAnnti818"

include:
  - _pages

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Archive pages use Liquid (GitHub Pages can't run jekyll-archives)
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
      show_date: true
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
